---
name: CI

concurrency:
  group: molecule-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
  workflow_dispatch:
jobs:
  molecule:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync

      - name: Get changed files
        id: changed-files
        if: ${{ github.event_name == 'pull_request' }}
        uses: tj-actions/changed-files@v47

      - name: Run pre-commit
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          uv run pre-commit run --all-files

      - name: Testing roles - pull-request
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          uv run cf-molecule \
            --strategy pr \
            --bucket-count 5 \
            --max-roles 12 \
            ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Testing roles - scheduled
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          BUCKET_COUNT=7
          BUCKET_INDEX=$(( (10#$(date -u +%j) - 1) % BUCKET_COUNT ))
          uv run cf-molecule \
            --strategy schedule \
            --bucket-count "${BUCKET_COUNT}" \
            --bucket-index "${BUCKET_INDEX}"
