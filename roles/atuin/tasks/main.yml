---
# yamllint disable rule:line-length
- name: Include rust role
  ansible.builtin.include_role:
    name: rust

- name: Install Atuin via cargo binstall
  ansible.builtin.command:
    cmd: "{{ ansible_facts['user_dir'] }}/.cargo/bin/cargo binstall atuin"
    creates: "{{ ansible_facts['user_dir'] }}/.cargo/bin/atuin"
    chdir: "{{ ansible_facts['user_dir'] }}"

- name: Write block in file to rc files
  ansible.builtin.blockinfile:
    backup: true
    path: "{{ item }}"
    create: true
    mode: "0600"
    append_newline: true
    prepend_newline: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK atuin"
    block: |
      . "$HOME/.atuin/bin/env
      eval "$(atuin init {{ 'zsh' if item.endswith('.zshrc') else 'bash' }})"
  with_items:
    - "{{ ansible_facts['user_dir'] }}/.zshrc"
    - "{{ ansible_facts['user_dir'] }}/.bashrc"

- name: Ensure ansible config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/ansible"
    state: directory
    mode: "0700"

- name: Copy config.toml to ansible config directory
  ansible.builtin.copy:
    src: config.toml
    dest: "{{ ansible_facts['user_dir'] }}/.config/ansible/config.toml"
    mode: "0600"
