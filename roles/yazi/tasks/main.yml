---
# yamllint disable rule:line-length
- name: Include rust role
  ansible.builtin.include_role:
    name: rust

- name: Install yazi via cargo binstall
  ansible.builtin.command:
    cmd: "{{ ansible_facts['user_dir'] }}/.cargo/bin/cargo binstall yazi-fm"
    creates: "{{ ansible_facts['user_dir'] }}/.cargo/bin/yazi"
    chdir: "{{ ansible_facts['user_dir'] }}"

- name: Write block in file to rc files
  ansible.builtin.blockinfile:
    backup: true
    path: "{{ item }}"
    create: true
    mode: "0600"
    append_newline: true
    prepend_newline: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK yazi"
    block: |
      function y() {
        local tmp="$(mktemp -t "yazi-cwd.XXXXXX")" cwd
        yazi "$@" --cwd-file="$tmp"
        if cwd="$(command cat -- "$tmp")" && [ -n "$cwd" ] && [ "$cwd" != "$PWD" ]; then
          builtin cd -- "$cwd"
        fi
        rm -f -- "$tmp"
      }
  with_items:
    - "{{ ansible_facts['user_dir'] }}/.zshrc"
    - "{{ ansible_facts['user_dir'] }}/.bashrc"
