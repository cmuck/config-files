---
# yamllint disable rule:line-length
- name: Include apt_update role
  ansible.builtin.include_role:
    name: apt_update

- name: Install docker dependencies
  ansible.builtin.apt:
    state: present
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg2
      - software-properties-common
  become: true

- name: "Install repo {{ ansible_role_name }}"
  ansible.builtin.include_role:
    name: apt_add_repo
  vars:
    apt_add_repo_key_url: "https://download.docker.com/linux/{{ ansible_facts['lsb']['id'] | lower }}/gpg"
    apt_add_repo_url: "https://download.docker.com/linux/{{ ansible_facts['lsb']['id'] | lower }} {{ ansible_facts['lsb']['codename'] }} stable"

- name: Include apt_update role
  ansible.builtin.include_role:
    name: apt_update

- name: Install docker
  ansible.builtin.apt:
    name: docker-ce
    state: present
  become: true

- name: Ensure group docker exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: "Add to docker group: {{ ansible_facts['user_id'] }}"
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups:
      - docker
    append: true
  become: true
# Reboot required to become effective
