---
# yamllint disable rule:line-length
- name: Ensure git is installed
  ansible.builtin.apt:
    state: present
    update_cache: true
    pkg:
      - apt-utils
      - gnupg2
  become: true

- name: "Install repo {{ ansible_role_name }}"
  ansible.builtin.include_role:
    name: apt_add_repo
  vars:
    apt_add_repo_key_url: https://packages.microsoft.com/keys/microsoft.asc
    apt_add_repo_url: "https://packages.microsoft.com/repos/vscode stable main"

- name: Install vscode
  ansible.builtin.apt:
    name: code
    state: present
  become: true
