---
- name: Include apt_update role
  ansible.builtin.include_role:
    name: apt_update

- name: Install flameshot
  ansible.builtin.apt:
    state: present
    pkg:
      - flameshot
  become: true

- name: Create config dir for flameshot
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/Dharkael"
    state: directory
    mode: "0755"

- name: Write flameshot configuration
  ansible.builtin.template:
    src: flameshot.ini.j2
    dest: "{{ ansible_facts['user_dir'] }}/.config/Dharkael/flameshot.ini"
    backup: true
    mode: "0644"
